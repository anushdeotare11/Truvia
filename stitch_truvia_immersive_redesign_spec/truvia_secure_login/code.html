<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Truvia | Secure Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#0d0e12",
                    "on-primary-fixed-variant": "#003bae",
                    "surface-variant": "#343538",
                    "secondary-fixed-dim": "#00dce5",
                    "tertiary-container": "#e07314",
                    "on-secondary-fixed-variant": "#004f53",
                    "surface-container-highest": "#343538",
                    "secondary-container": "#00f4fe",
                    "error": "#ffb4ab",
                    "on-surface-variant": "#c3c5d7",
                    "on-error-container": "#ffdad6",
                    "on-secondary-container": "#006c71",
                    "on-primary-container": "#00226d",
                    "on-background": "#e3e2e7",
                    "primary-fixed-dim": "#b5c4ff",
                    "outline-variant": "#434654",
                    "surface-container-high": "#292a2e",
                    "surface": "#121317",
                    "background": "#121317",
                    "surface-tint": "#b5c4ff",
                    "primary-container": "#658aff",
                    "on-tertiary-fixed-variant": "#723600",
                    "secondary-fixed": "#63f7ff",
                    "on-tertiary-fixed": "#311300",
                    "surface-container-low": "#1a1b1f",
                    "inverse-primary": "#1c53d7",
                    "inverse-surface": "#e3e2e7",
                    "outline": "#8d90a0",
                    "on-tertiary-container": "#461f00",
                    "on-tertiary": "#512400",
                    "on-error": "#690005",
                    "inverse-on-surface": "#2f3034",
                    "primary-fixed": "#dce1ff",
                    "on-primary-fixed": "#00164e",
                    "on-secondary-fixed": "#002021",
                    "tertiary-fixed-dim": "#ffb787",
                    "tertiary": "#ffb787",
                    "on-primary": "#00287c",
                    "primary": "#b5c4ff",
                    "secondary": "#e6feff",
                    "error-container": "#93000a",
                    "on-surface": "#e3e2e7",
                    "tertiary-fixed": "#ffdcc7",
                    "surface-dim": "#121317",
                    "on-secondary": "#003739",
                    "surface-container": "#1e1f23",
                    "surface-bright": "#38393d"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "margin-desktop": "40px",
                    "gutter": "24px",
                    "container-max": "1440px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "headline-lg": ["Outfit"],
                    "display-xl": ["Outfit"],
                    "label-md": ["Inter"],
                    "headline-md": ["Outfit"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "display-xl": ["64px", {"lineHeight": "72px", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["10px", {"lineHeight": "12px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .glass-card {
            background: rgba(18, 19, 23, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-glass:focus {
            background: rgba(79, 123, 255, 0.05);
            border-bottom-color: #00f4fe;
            box-shadow: 0 10px 20px -10px rgba(0, 244, 254, 0.2);
        }

        .btn-bloom {
            background: linear-gradient(135deg, #4f7bff 0%, #00f4fe 100%);
            box-shadow: 0 0 20px rgba(79, 123, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-bloom:hover {
            box-shadow: 0 0 30px rgba(0, 244, 254, 0.5);
            transform: translateY(-1px);
        }

        .btn-bloom:active {
            transform: scale(0.98);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(79, 123, 255, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: pulse-glow 8s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen flex items-center justify-center selection:bg-secondary-container/30 overflow-hidden">
<!-- Background Layer -->
<div class="fixed inset-0 z-[-2]">

</div>
<div class="bg-glow"></div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[480px] px-margin-mobile md:px-0">
<!-- Central Login Card -->
<div class="glass-card rounded-[32px] p-8 md:p-12 relative overflow-hidden">
<!-- Glass Shine Effect -->
<div class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-to-br from-white/10 to-transparent rotate-45 pointer-events-none"></div>
<!-- Header Section -->
<div class="flex flex-col items-center text-center mb-10">
<div class="mb-4">
<h1 class="font-headline-md text-headline-md md:text-headline-md tracking-tighter text-primary bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary-container flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shield</span>
                        Truvia
                    </h1>
</div>
<p class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-outline opacity-80">
                    Premier Public Safety Network
                </p>
</div>
<!-- Tab Switcher -->
<div class="flex p-1 bg-white/5 rounded-full mb-8 relative">
<button class="flex-1 py-2.5 font-label-md text-label-md rounded-full transition-all text-outline hover:text-on-surface z-10" id="tab-citizen">
                    CITIZEN
                </button>
<button class="flex-1 py-2.5 font-label-md text-label-md rounded-full transition-all text-on-surface z-10" id="tab-agency">
                    AGENCY
                </button>
<!-- Active Indicator -->
<div class="absolute top-1 left-1/2 bottom-1 w-[calc(50%-4px)] bg-white/10 rounded-full transition-transform duration-300 translate-x-0" id="tab-indicator"></div>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2 group">
<label class="font-label-sm text-label-sm text-outline group-focus-within:text-secondary-fixed-dim transition-colors">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline/50 group-focus-within:text-secondary-fixed-dim transition-colors">person</span>
<input class="w-full pl-8 pr-4 py-3 bg-transparent outline-none input-glass font-body-md text-on-surface placeholder:text-outline/30" placeholder="name@agency.gov" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2 group">
<div class="flex justify-between items-end">
<label class="font-label-sm text-label-sm text-outline group-focus-within:text-secondary-fixed-dim transition-colors">PASSWORD</label>
<a class="font-label-sm text-label-sm text-primary/70 hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline/50 group-focus-within:text-secondary-fixed-dim transition-colors">lock</span>
<input class="w-full pl-8 pr-4 py-3 bg-transparent outline-none input-glass font-body-md text-on-surface placeholder:text-outline/30" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full mt-4 btn-bloom rounded-xl py-4 flex items-center justify-center gap-3 text-on-primary-fixed font-headline-md tracking-tight group">
<span class="material-symbols-outlined text-[20px]" data-weight="fill">shield</span>
<span class="font-headline-md text-[18px]">SECURE LOGIN</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-10 pt-8 border-t border-white/5 text-center">
<p class="font-body-sm text-body-sm text-outline">
                    Don't have an account? 
                    <a class="text-secondary-fixed-dim font-semibold hover:underline decoration-secondary-fixed-dim/30 underline-offset-4 ml-1" href="#">Create an Account</a>
</p>
</div>
</div>
<!-- Security Disclaimer -->
<div class="mt-8 flex flex-col items-center gap-2 opacity-50">
<div class="flex items-center gap-2 text-outline font-label-sm text-label-sm uppercase tracking-widest">
<span class="material-symbols-outlined text-[14px]">lock_reset</span>
                Standard encryption active
            </div>
<p class="font-label-sm text-label-sm text-outline/80">
                TLS 1.3 / AES-256 BIT ENCRYPTION ACTIVE
            </p>
</div>
</main>
<!-- Side Graphic (Desktop Only) -->
<div class="hidden lg:block fixed left-12 top-1/2 -translate-y-1/2 opacity-20 pointer-events-none">
<div class="flex flex-col gap-8">
<div class="w-1 h-24 bg-gradient-to-b from-primary to-transparent"></div>
<div class="w-1 h-48 bg-gradient-to-b from-secondary-container to-transparent opacity-50"></div>
<div class="w-1 h-12 bg-gradient-to-b from-error to-transparent"></div>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        const tabCitizen = document.getElementById('tab-citizen');
        const tabAgency = document.getElementById('tab-agency');
        const tabIndicator = document.getElementById('tab-indicator');

        tabCitizen.addEventListener('click', () => {
            tabIndicator.style.transform = 'translateX(-100%)';
            tabCitizen.classList.add('text-on-surface');
            tabCitizen.classList.remove('text-outline');
            tabAgency.classList.remove('text-on-surface');
            tabAgency.classList.add('text-outline');
        });

        tabAgency.addEventListener('click', () => {
            tabIndicator.style.transform = 'translateX(0)';
            tabAgency.classList.add('text-on-surface');
            tabAgency.classList.remove('text-outline');
            tabCitizen.classList.remove('text-on-surface');
            tabCitizen.classList.add('text-outline');
        });
    </script>
</body></html>
